spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:prod-db}:${DB_PORT:5432}/codechallenge_db
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  liquibase:
    enabled: true

  kafka:
    listener:
      enabled: true
    consumer:
      group-id: codechallenge-${ENV_NAME:prod}
  cache:
    type: redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 6000

logging:
  level:
    root: WARN
    de.dk.api.codeChallenge: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers
  endpoint:
    health:
      show-details: never

info:
  app:
    name: code-challenge
    version: 1.0.0


