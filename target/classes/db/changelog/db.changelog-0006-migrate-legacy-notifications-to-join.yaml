databaseChangeLog:
  - changeSet:
      id: 0006-migrate-legacy-notifications-to-join
      author: burak albayrakoglu
      preConditions:
        onFail: MARK_RAN
        onError: HALT
        nestedPreconditions:
          - tableExists:
              tableName: user_notifications
          - tableExists:
              tableName: users
          - columnExists:
              tableName: users
              columnName: notifications
          - tableExists:
              tableName: notification_types
      changes:
        - sql:
            dbms: postgresql
            sql: |
              INSERT INTO user_notifications (user_id, notification_type_id)
              SELECT u.id, t.id
              FROM (
                SELECT id, unnest(string_to_array(notifications, ';')) as type_name
                FROM users
                WHERE notifications IS NOT NULL AND notifications != ''
              ) u
              JOIN notification_types t ON u.type_name = t.name
              ON CONFLICT DO NOTHING;

        - sql:
             dbms: h2
             sql: |
               INSERT INTO user_notifications (user_id, notification_type_id)
               SELECT u.id, t.id
               FROM users u
               CROSS JOIN notification_types t
               WHERE u.notifications LIKE '%' || t.name || '%';

      rollback:
        - delete:
            tableName: user_notifications