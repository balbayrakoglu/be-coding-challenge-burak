databaseChangeLog:
  - changeSet:
      id: 0003-create-notification-tables
      author: you
      changes:
        - createTable:
            tableName: notification_types
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
              - column:
                  name: category
                  type: VARCHAR(16)
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: notification_types
            columnNames: name
            constraintName: uk_notification_types_name

        - createTable:
            tableName: user_notifications
            columns:
              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: notification_type_id
                  type: UUID
                  constraints:
                    nullable: false

        - addPrimaryKey:
            tableName: user_notifications
            columnNames: user_id, notification_type_id
            constraintName: pk_user_notifications

        - addForeignKeyConstraint:
            baseTableName: user_notifications
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_un_user

        - addForeignKeyConstraint:
            baseTableName: user_notifications
            baseColumnNames: notification_type_id
            referencedTableName: notification_types
            referencedColumnNames: id
            constraintName: fk_un_type

        - createIndex:
            tableName: notification_types
            indexName: idx_notification_types_category
            columns:
              - column:
                  name: category
